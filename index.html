<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter & Verse — Book Store</title>

    <!-- Preconnect speeds up the Google Fonts request (performance optimization) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="site-header">
        <div class="header-inner">
            <a href="#" class="logo">Chapter <span>&amp;</span> Verse</a>

            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="Search titles or authors…" aria-label="Search books">
            </div>

            <button class="cart-btn" id="cartToggle" aria-label="Open cart">
                🛒 Cart <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Find your next chapter.</h1>
            <p>A small, curated shelf of books — fiction, non-fiction, and everything in between.</p>
        </section>

        <section class="filters" id="filters">
            <!-- Category buttons are generated by JS from the product data -->
        </section>

        <section class="product-grid" id="productGrid">
            <!-- Product cards are injected by JS -->
        </section>

        <p class="no-results" id="noResults" hidden>No books match your search. Try another title or category.</p>
    </main>

    <!-- Cart drawer -->
    <aside class="cart-drawer" id="cartDrawer" aria-hidden="true">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-btn" id="closeCart" aria-label="Close cart">✕</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">Checkout</button>
        </div>
    </aside>
    <div class="overlay" id="overlay"></div>

    <footer class="site-footer">
        <p>Built as a capstone project — HTML, CSS &amp; JavaScript. No frameworks, no backend.</p>
    </footer>

    <!-- JS loaded at the end of body (not blocking page render — a performance practice) -->
    <script src="script.js" defer></script>
</body>

</html>
